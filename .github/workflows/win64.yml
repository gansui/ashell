name: Windows x64 Release

# 仅编译 Windows 10+ AMD64 Release 版本
# 可手动触发或在推送 tag 时自动运行

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          # 设置 Windows 10 最低版本 (0x0A00 = 10.0)
          CARGO_ENCODED_RUSTFLAGS: "-C link-arg=/SUBSYSTEM:WINDOWS"

      - name: Package
        shell: bash
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="ashell-${VERSION}-win64"
          mkdir "$STAGE"
          cp "target/x86_64-pc-windows-msvc/release/ashell.exe" "$STAGE/"
          7z a "${STAGE}.zip" "$STAGE" >/dev/null
          echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ env.ASSET }}

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
